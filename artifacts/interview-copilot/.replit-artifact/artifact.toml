kind = "web"
previewPath = "/"
title = "AI Interview Copilot"
version = "1.0.0"
id = "artifacts/interview-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21755

[services.development]
run = "pnpm --filter @workspace/interview-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interview-copilot", "run", "build" ]
publicDir = "artifacts/interview-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21755"
BASE_PATH = "/"
